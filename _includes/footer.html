<footer class="color-bg-subtle border-top py-4 color-fg-muted text-center mt-6 flex-none">
  <span aria-label="Nodos soberanos de Leviatán">
    <a href="https://leviatan-centinel-levi.org" class="color-fg-default mb-2">
      Infraestructura Soberana de Leviatán
    </a>
  </span>
  
  <div class="d-flex flex-justify-center text-uppercase text-bold my-1">
    <a href="{{ site.baseurl }}/feed.xml" aria-label="Feed xml" class="d-flex flex-items-center color-fg-muted text-uppercase mr-4">
      <div class="d-flex mr-1">{% octicon rss %}</div>
      {{ site.data.ui-text[site.locale].feed_label }}
    </a>
    <!-- Enlace a la comunidad interna en lugar de github.community -->
    <a href="https://leviatan-centinel-levi.org/support" class="d-flex flex-items-center color-fg-muted text-uppercase">
      <div class="d-flex mr-1">{% octicon organization %}</div> Comunidad Leviatán
    </a>
  </div>

  <p>&copy; {{ site.time | date: '%Y' }} {{ site.name }}. 
    Infraestructura blindada por el Agente Centinel.
  </p>
</footer>
