name: 🛡️ CENTINEL: Despliegue Soberano a Pages

on:
  push:
    branches: ["principal"] # Alineado a tu rama soberana
  pull_request:
    branches: ["principal"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Soberano 🛎️
      uses: actions/checkout@v4
      
    - name: Set up Node (LTS) ⚙️
      uses: actions/setup-node@v4
      with:
        node-version: '20' # LTS actual
        cache: 'npm'

    - name: Install node modules 📦
      run: npm install

    - name: Set up Ruby 💎
      uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true

    - name: Set up Pages 🌐
      id: pages
      uses: actions/configure-pages@v5 # Actualizado

    - name: Build and Test 🏗️
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          bundle exec rake
        else
          bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        fi
      env:
        JEKYLL_ENV: production

    - name: Upload artifact 🚀
      uses: actions/upload-pages-artifact@v3 # Actualizado

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/principal'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages 🛡️
        id: deployment
        uses: actions/deploy-pages@v4 # Actualizado


