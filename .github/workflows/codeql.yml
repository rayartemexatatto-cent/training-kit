name: "🛡️ CENTINEL: CodeQL Soberano"

on:
  push:
    branches: [ "principal" ] # Asegurado a tu rama soberana
  pull_request:
    branches: [ "principal" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'ruby' ]

    steps:
    - name: Checkout Soberano 🛎️
      uses: actions/checkout@v4 # Actualizado a v4

    - name: Initialize CodeQL 🛡️
      uses: github/codeql-action/init@v3 # Actualizado a v3
      with:
        languages: ${{ matrix.language }}
        # Obligamos al uso de paquetes de seguridad extendida
        queries: security-extended,security-and-quality

    # 🛑 ELIMINADO: Autobuild (Demasiado peligroso)
    # Debes definir explícitamente cómo se construye tu nodo
    - name: Build Soberano 🏗️
      run: |
        echo "Validando integridad de dependencias..."
        # Aquí añades tu comando de build real, por ejemplo:
        # bundle install && bundle exec rake build

    - name: Perform CodeQL Analysis 🔍
      uses: github/codeql-action/analyze@v3 # Actualizado a v3
      with:
        category: "/language:${{matrix.language}}"
